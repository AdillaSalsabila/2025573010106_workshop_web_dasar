<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1: Styling Komponen UI</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

    <div class="container">
        <section>
            <h2>Varian Tombol</h2>
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-outline">Outline</button>
        </section>

        <hr>

        <section>
            <h2>Varian Badge</h2>
            <span class="badge badge-blue">New</span>
            <span class="badge badge-purple">Feature</span>
            <span class="badge badge-gray">Draft</span>
        </section>

        <hr>

        <section>
            <h2>Alert Box</h2>
            <div class="alert alert-success">✅ Berhasil: Data telah disimpan!</div>
            <div class="alert alert-warning">⚠️ Peringatan: Periksa kembali input Anda.</div>
            <div class="alert alert-error">❌ Error: Koneksi server terputus.</div>
        </section>
    </div>

</body>
</html>
