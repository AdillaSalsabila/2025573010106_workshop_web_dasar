<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <link rel="stylesheet"href="grid.css">
</head>
<body>
    <h1>Demo CSS Grid</h1>
     <section class="grid-dasar">
        <div>item 1</div>
        <div>item 2</div>
        <div>item 3</div>
        <div>item 4</div>
        <div>item 5</div>
        <div>item 6</div>
     </section>
     <section class="layout-halaman">
        <header class ="l-header">header</header>
         <nav class="l-sidebar">sidebar</nav>
         <main class="l-konten"> konten utama</main>
         <aside class="l-aside">aside</aside>
         <footer class="l-footer">footer</footer>
     </section>
     <section class="grid-dasar">
        <div>A</div><div>B</div>
        <div>C</div><div>D</div>
        <div>E</div><div>F</div>
        <div>G</div><div>H</div>
     </section>
     <section class="galeri">
        <div class="g-besar">foto utama</div>
        <div>foto 2</div>
        <div>foto 3</div>
        <div>foto 4</div>
        <div class="g-lebar">banner panjang</div>
        <div>foto 6</div>
     </section>
</body>
</html>
