<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CSS Grid</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Dashboard Admin</h1>
        </header>

        <aside class="sidebar">
            <nav>
                <ul>
                    <li>Beranda</li>
                    <li>Statistik</li>
                    <li>Laporan</li>
                    <li>Pengaturan</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            
            <section class="stats-grid">
                <div class="card">Stat 1</div>
                <div class="card">Stat 2</div>
                <div class="card">Stat 3</div>
                <div class="card">Stat 4</div>
            </section>

            <section class="data-section">
                <div class="table-area">Area Tabel</div>
                <div class="chart-area">Area Grafik</div>
            </section>

        </main>
    </div>

</body>
</html>
